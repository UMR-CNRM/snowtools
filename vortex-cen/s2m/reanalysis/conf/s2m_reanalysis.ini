[DEFAULT]
python            = /opt/softs/anaconda3/envs/Py37nomkl/bin/python
nproc              = 120
ntasks             = 120
openmp             = 1
nnodes             = 1
guess_block        = guess
cpl_geometry       = euroc25
cumul              = 6
model              = safran
namespace          = vortex.multi.fr
source_app         = arpege
deterministic_conf = 4dvarfr
eps_conf           = pearp
ana_terms          = 0-24-6
# la variable 'execution' permet de régler les ebauches de rr par type de temps (execution=reanalysis) ou avec les guess (execution=analysis)
execution          = reanalysis
extrapythonpath    = epygram
cutoff             = assimilation

[safran]
#geometry           = dict(alp:alp27_flat pyr:pyr24_flat cor:cor2_flat mac:mac11_flat vog:vog3_flat jur:jur4_flat)
cycle              = uenv:s2m.reanalysis_era5.6@vernaym
assim              = True
obs_xpid           = GRIN_2700E_1940-2024_SELECT
obs_user           = monteirod
obs_vapp           = safran

[surfex_reanalysis_alp]
nprocs             = 80
ntasks             = 80

[addslopes]
forcing_geometry   = dict(alp27_allslopes:alp27_flat pyr24_allslopes:pyr24_flat cor2_allslopes:cor2_flat mac11_allslopes:mac11_flat vog3_allslopes:vog3_flat jur4_allslopes:jur4_flat)
forcing_block      = massifs

[offline]
genv               = uenv:s2m.reanalysis_era5.6@vernaym
nprocs             = dict(alp27_allslopes:80 pyr24_allslopes:80 cor2_allslopes:80 mac11_allslopes:80 vog3_allslopes:80 jur4_allslopes:80)
ntasks             = dict(alp27_allslopes:80 pyr24_allslopes:80 cor2_allslopes:80 mac11_allslopes:80 vog3_allslopes:80 jur4_allslopes:80)

